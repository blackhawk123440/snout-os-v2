# Smoke test Postgres - port 5433 to avoid conflicts with dev (5432)
# Usage: pnpm db:smoke:up | db:smoke:down | db:smoke:reset

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: snout_smoke
    ports:
      - "5433:5432"
    volumes:
      - smoke_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  smoke_pg_data:
